server.port=8081
spring.application.name=stockkg-backend

# ========== Neo4j：知识图谱持久化 ==========
# 默认连接本机 Neo4j；也可以通过环境变量覆盖。
spring.neo4j.uri=${NEO4J_URI:bolt://localhost:7687}
spring.neo4j.authentication.username=${NEO4J_USERNAME:neo4j}
spring.neo4j.authentication.password=${NEO4J_PASSWORD:zoao1712}

# ========== MySQL：用户、后台管理数据持久化 ==========
# 如果 root 用户有建库权限，createDatabaseIfNotExist=true 会自动创建 stockkg_manage。
spring.datasource.url=${MYSQL_URL:jdbc:mysql://localhost:3306/stockkg_manage?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true}
spring.datasource.username=${MYSQL_USERNAME:root}
spring.datasource.password=${MYSQL_PASSWORD:zoao1712}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# 控制台日志更清晰
logging.level.org.springframework.data.neo4j.cypher=INFO
logging.level.org.hibernate.SQL=INFO

# DeepSeek：建议使用环境变量，不要把真实 Key 写入代码仓库。
deepseek.api-key=${DEEPSEEK_API_KEY:sk-631b85f3c7c847cdba88d3b2b5ede474}
deepseek.base-url=${DEEPSEEK_BASE_URL:https://api.deepseek.com}
deepseek.model=${DEEPSEEK_MODEL:deepseek-chat}
deepseek.json-model=${DEEPSEEK_JSON_MODEL:deepseek-chat}
deepseek.stream-model=${DEEPSEEK_STREAM_MODEL:deepseek-reasoner}
